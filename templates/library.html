{% extends 'base.html' %}

{% block title %}Results — Study Tool{% endblock %}

{% block head %}
<style>
  :root {
    --library-sidebar: 260px;
  }

  main {
    position: relative;
    display: flex;
    flex: 1;
    min-height: calc(100vh - var(--navbar-height));
  }

  .folder-title {
    font-size: 1.1rem;
    font-weight: 600;
  }

  .file-count {
    margin-top: 0.2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .library-sidebar {
    width: var(--library-sidebar);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow: hidden;
    transition: width 0.2s ease;
  }

  .library-sidebar.collapsed {
    width: 0;
  }

  .library-sidebar-inner {
    height: 100%;
    width: var(--library-sidebar);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
  }

  .library-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1rem 0.75rem;
    flex-shrink: 0;
  }

  /* ── Toggle tab — sits on the edge of the library-sidebar ── */
  .library-sidebar-tab {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 6px 6px 0;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.4rem;
    transition: color 0.15s, background 0.15s;
  }

  .library-sidebar-tab:hover {
    color: var(--text);
    background: var(--border);
  }

  .library-sidebar.collapsed+.library-sidebar-tab {
    left: 0;
  }

  /* ── Folder tree ── */
  .folder-tree {
    padding: 0 0.5rem 1rem;
  }

  .folder-row,
  .unfiled-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--muted);
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }

  .folder-row:hover,
  .unfiled-row:hover {
    background: var(--border);
    color: var(--text);
  }

  .folder-row.active,
  .unfiled-row.active {
    background: rgba(124, 106, 247, 0.15);
    color: var(--accent);
  }

  .folder-toggle {
    width: 12px;
    flex-shrink: 0;
    font-size: 0.6rem;
    transition: transform 0.15s;
  }

  .folder-toggle.open {
    transform: rotate(90deg);
  }

  .folder-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .folder-actions {
    display: none;
    gap: 0.2rem;
  }

  .folder-row:hover .folder-actions {
    display: flex;
  }

  .folder-children {
    padding-left: 1rem;
  }

  .library-pane {
    flex: 1;
    > :nth-child(1) {
      gap: 0;
    }
    > :not(:first-child) {
      margin: 0.75rem 1rem 0.5rem;
    }
  }

  /* ── Sort select ── */
  .sort-select {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
    background: var(--surface);
    color: var(--muted);
  }

  .sort-select:hover,
  .sort-select:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  /* ── Save cards grid ── */
  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .file-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }

  .file-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .file-thumbnail {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: var(--border);
  }

  .file-thumbnail-placeholder {
    width: 100%;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    font-size: 2rem;
  }

  .file-body {
    padding: 0.875rem;
  }

  .file-title {
    margin-bottom: 0.3rem;
    font-size: 0.9rem;
    font-weight: 600;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .save-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ── Card action buttons (hover) ── */
  .card-actions {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .file-card:hover .card-actions {
    opacity: 1;
  }

  .card-action-btn {
    padding: 0.25rem 0.45rem;
    font-size: 0.7rem;
    background: rgba(15, 17, 23, 0.85);
  }

  .card-action-btn.danger:hover {
    color: var(--error);
    border-color: var(--error);
  }
</style>
{% endblock %}

{% block content %}
<main>
  <div class="overlay" id="overlay" onclick="togglelibrary_sidebar()"></div>

  <aside class="library-sidebar" id="library-sidebar">
    <div class="library-sidebar-inner">
      <div class="library-sidebar-header">
        <span class="eyebrow">Library</span>
        <button class="icon-btn" title="New folder" onclick="openNewFolderModal(null)">＋</button>
      </div>

      <div class="folder-tree">
        <div class="unfiled-row active" id="row-unfiled" onclick="filterSaves('unfiled')">
          <span>📄</span>
          <span class="folder-name">Unfiled</span>
        </div>
        <div id="folder-tree-root"></div>
      </div> <!-- /library-sidebar-inner -->
    </div>
  </aside>

  <div class="library-pane">
    <div>
      <div>
        <div class="library-sidebar-tab" id="library-sidebar-tab" onclick="togglelibrary_sidebar()"
          title="Toggle library-sidebar">&#155</div>
        <!-- <div>TODO: add search here</div> -->
      </div>
    </div>
    <span class="folder-title" id="folder-title"></span><span class="file-count" id="file-count"></span>
    <select class="field sort-select" id="sort-select" onchange="applySort()">
      <option value="date-desc">Newest first</option>
      <option value="date-asc">Oldest first</option>
      <option value="title-asc">Title A–Z</option>
      <option value="title-desc">Title Z–A</option>
    </select>
    <div class="files-grid" id="files-grid"></div>
  </div>
</main>

<!-- New folder modal -->
<div class="modal-overlay" id="new-folder-modal">
  <div class="modal">
    <p class="modal-title">New folder</p>
    <div class="modal-body">
      <div>
        <label class="field-label">Name</label>
        <input class="field" type="text" id="new-folder-name" placeholder="Folder name" />
        <input type="hidden" id="new-folder-parent" value="" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('new-folder-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<!-- Rename folder modal -->
<div class="modal-overlay" id="rename-folder-modal">
  <div class="modal">
    <p class="modal-title">Rename folder</p>
    <div class="modal-body">
      <div>
        <label class="field-label">Name</label>
        <input class="field" type="text" id="rename-folder-name" />
        <input type="hidden" id="rename-folder-id" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('rename-folder-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="renameFolder()">Rename</button>
    </div>
  </div>
</div>

<!-- Rename save modal -->
<div class="modal-overlay" id="rename-save-modal">
  <div class="modal">
    <p class="modal-title">Rename</p>
    <div class="modal-body">
      <div>
        <label class="field-label">Title</label>
        <input class="field" type="text" id="rename-file-title" />
        <input type="hidden" id="rename-save-id" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('rename-save-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="renameSave()">Save</button>
    </div>
  </div>
</div>

<!-- Move save modal -->
<div class="modal-overlay" id="move-save-modal">
  <div class="modal">
    <p class="modal-title">Move to folder</p>
    <div class="modal-body">
      <div>
        <label class="field-label">Folder</label>
        <select class="field" id="move-save-folder">
          <option value="">Unfiled</option>
        </select>
        <input type="hidden" id="move-save-id" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('move-save-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="moveSave()">Move</button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  const allSaves = {{ saves | tojson }};
  const FOLDER_TREE = {{ folder_tree | tojson }};
  let currentFilter = "all";
  let currentSaves = [...allSaves];

  /* ── Folder tree ── */
  function renderFolderTree(folders, container) {
    folders.forEach(f => {
      const item = document.createElement("div");
      item.innerHTML = `
          <div class="folder-row" id="row-${f.id}"
               onclick="filterSaves('${f.id}', '${f.name.replace(/'/g, "\\'")}')">
            <span class="folder-toggle ${f.children?.length ? "open" : ""}"
                  id="toggle-${f.id}"
                  onclick="toggleFolder(event, '${f.id}')">▶</span>
            <span>📁</span>
            <span class="folder-name">${f.name}</span>
            <div class="folder-actions">
              <button class="icon-btn" title="New subfolder"
                      onclick="event.stopPropagation(); openNewFolderModal('${f.id}')">＋</button>
              <button class="icon-btn" title="Rename"
                      onclick="openRenameFolderModal(event, '${f.id}', '${f.name.replace(/'/g, "\\'")}')">✎</button>
              <button class="icon-btn" title="Delete"
                      onclick="deleteFolder(event, '${f.id}')">✕</button>
            </div>
          </div>
          ${f.children?.length ? `<div class="folder-children" id="children-${f.id}"></div>` : ""}
        `;
      container.appendChild(item);
      if (f.children?.length) renderFolderTree(f.children, item.querySelector(`#children-${f.id}`));
    });
  }

  renderFolderTree(FOLDER_TREE, document.getElementById("folder-tree-root"));

  /* ── Filter ── */
  function filterSaves(filter, folderName) {
    currentFilter = filter;
    document.querySelectorAll(".folder-row, .unfiled-row").forEach(r => r.classList.remove("active"));
    document.getElementById("row-" + filter)?.classList.add("active");
    document.getElementById("folder-title").textContent =
      folderName || { all: "All saves", unfiled: "Unfiled" }[filter] || "Folder";
    currentSaves = filter === "all" ? [...allSaves]
      : filter === "unfiled" ? allSaves.filter(s => !s.folder_id)
        : allSaves.filter(s => s.folder_id === filter);
    applySort();
  }

  /* ── Sort ── */
  function applySort() {
    const sort = document.getElementById("sort-select").value;
    const sorted = [...currentSaves];
    if (sort === "date-desc") sorted.sort((a, b) => b.created_at.localeCompare(a.created_at));
    else if (sort === "date-asc") sorted.sort((a, b) => a.created_at.localeCompare(b.created_at));
    else if (sort === "title-asc") sorted.sort((a, b) => a.title.localeCompare(b.title));
    else if (sort === "title-desc") sorted.sort((a, b) => b.title.localeCompare(a.title));
    renderSaves(sorted);
  }

  /* ── Render cards ── */
  function renderSaves(saves) {
    const grid = document.getElementById("files-grid");
    document.getElementById("file-count").textContent = `(${saves.length} articles)`;

    if (!saves.length) {
      grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">📭</div><p>No saves here yet.</p></div>`;
      return;
    }

    grid.innerHTML = saves.map(s => `
      <div class="file-card" id="card-${s.id}" onclick="openSave(event, '${s.id}')">
        ${s.thumbnail_url
        ? `<img class="file-thumbnail" src="${s.thumbnail_url}" alt="" />`
        : `<div class="file-thumbnail-placeholder">🎬</div>`}
        <div class="file-body">
          <div class="file-title" id="title-${s.id}">${s.title}</div>
          <div class="save-meta">
            ${s.video_channel ? `<span>${s.video_channel}</span>` : ""}
            ${s.duration ? `<span>${formatDuration(s.duration)}</span>` : ""}
            <span>${s.created_at.slice(0, 10)}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn card-action-btn" title="Rename"
                  onclick="openRenameSaveModal(event, '${s.id}', \`${s.title.replace(/`/g, "\\`")}\`)">✎</button>
          <button class="btn card-action-btn" title="Move"
                  onclick="openMoveSaveModal(event, '${s.id}')">⇄</button>
          <button class="btn card-action-btn danger" title="Delete"
                  onclick="deleteSave(event, '${s.id}')">✕</button>
        </div>
      </div>
    `).join("");
  }
  function openSave(e, id) {
    if (!e.target.closest(".card-actions")) window.location.href = `/saves/${id}`;
  }

  /* ── Save actions ── */
  async function deleteSave(e, id) {
    e.stopPropagation();
    if (!confirm("Delete this save?")) return;
    await fetch(`/saves/${id}`, { method: "DELETE" });
    allSaves.splice(allSaves.findIndex(s => s.id === id), 1);
    filterSaves(currentFilter, document.getElementById("folder-title").textContent);
  }

  function openRenameSaveModal(e, id, title) {
    e.stopPropagation();
    document.getElementById("rename-save-id").value = id;
    document.getElementById("rename-file-title").value = title;
    openModal("rename-save-modal");
    setTimeout(() => document.getElementById("rename-file-title").focus(), 50);
  }

  async function renameSave() {
    const id = document.getElementById("rename-save-id").value;
    const title = document.getElementById("rename-file-title").value.trim();
    if (!title) return;
    const res = await fetch(`/saves/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title }),
    });
    if (res.ok) {
      const save = allSaves.find(s => s.id === id);
      if (save) save.title = title;
      const el = document.getElementById(`title-${id}`);
      if (el) el.textContent = title;
      closeModal("rename-save-modal");
    } else {
      alert("Failed to rename.");
    }
  }

  async function openMoveSaveModal(e, id) {
    e.stopPropagation();
    document.getElementById("move-save-id").value = id;
    const select = document.getElementById("move-save-folder");
    select.innerHTML = '<option value="">Unfiled</option>';
    populateFolderSelect(select, FOLDER_TREE, 0);
    const save = allSaves.find(s => s.id === id);
    if (save?.folder_id) select.value = save.folder_id;
    openModal("move-save-modal");
  }

  async function moveSave() {
    const id = document.getElementById("move-save-id").value;
    const folder_id = document.getElementById("move-save-folder").value || null;
    const res = await fetch(`/saves/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ folder_id }),
    });
    if (res.ok) {
      const save = allSaves.find(s => s.id === id);
      if (save) save.folder_id = folder_id;
      closeModal("move-save-modal");
      filterSaves(currentFilter, document.getElementById("folder-title").textContent);
    } else {
      alert("Failed to move.");
    }
  }

  function populateFolderSelect(select, folders, depth) {
    folders.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f.id;
      opt.textContent = "\u00a0".repeat(depth * 4) + f.name;
      select.appendChild(opt);
      if (f.children?.length) populateFolderSelect(select, f.children, depth + 1);
    });
  }

  /* ── Folder actions ── */
  function openNewFolderModal(parentId) {
    document.getElementById("new-folder-name").value = "";
    document.getElementById("new-folder-parent").value = parentId || "";
    openModal("new-folder-modal");
    setTimeout(() => document.getElementById("new-folder-name").focus(), 50);
  }

  async function createFolder() {
    const name = document.getElementById("new-folder-name").value.trim();
    const parent_id = document.getElementById("new-folder-parent").value || null;
    if (!name) return;
    await fetch("/folders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, parent_id }),
    });
    closeModal("new-folder-modal");
    window.location.reload();
  }

  function openRenameFolderModal(e, id, name) {
    e.stopPropagation();
    document.getElementById("rename-folder-id").value = id;
    document.getElementById("rename-folder-name").value = name;
    openModal("rename-folder-modal");
    setTimeout(() => document.getElementById("rename-folder-name").focus(), 50);
  }

  async function renameFolder() {
    const id = document.getElementById("rename-folder-id").value;
    const name = document.getElementById("rename-folder-name").value.trim();
    if (!name) return;
    await fetch(`/folders/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    closeModal("rename-folder-modal");
    window.location.reload();
  }

  async function deleteFolder(e, id) {
    e.stopPropagation();
    if (!confirm("Delete this folder and all its contents?")) return;
    await fetch(`/folders/${id}`, { method: "DELETE" });
    window.location.reload();
  }

  function toggleFolder(e, id) {
    e.stopPropagation();
    const children = document.getElementById("children-" + id);
    const toggle = document.getElementById("toggle-" + id);
    if (!children) return;
    const open = children.style.display !== "none";
    children.style.display = open ? "none" : "block";
    toggle.classList.toggle("open", !open);
  }

  /* ── Modal helpers ── */
  function openModal(id) { document.getElementById(id).classList.add("open"); }
  function closeModal(id) { document.getElementById(id).classList.remove("open"); }

  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("open"); });
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") document.querySelectorAll(".modal-overlay.open").forEach(m => m.classList.remove("open"));
    if (e.key === "Enter") {
      if (document.getElementById("new-folder-modal").classList.contains("open")) createFolder();
      if (document.getElementById("rename-folder-modal").classList.contains("open")) renameFolder();
      if (document.getElementById("rename-save-modal").classList.contains("open")) renameSave();
    }
  });

  /* ── Helpers ── */
  function formatDuration(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return h > 0
      ? `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`
      : `${m}:${String(sec).padStart(2, "0")}`;
  }

  /* ── Init ── */
  filterSaves("Unfiled");

  /* ── library-sidebar toggle ── */
  function togglelibrary_sidebar() {
    const library_sidebar = document.getElementById("library-sidebar");
    const tab = document.getElementById("library-sidebar-tab");
    const overlay = document.getElementById("overlay");
    const collapsed = library_sidebar.classList.toggle("collapsed");

    tab.textContent = collapsed ? "\u203A" : "\u2039";
    if (overlay) overlay.classList.toggle("visible", !collapsed && window.innerWidth <= 768);
  }

  // Auto-collapse on small screens
  if (window.innerWidth <= 768) {
    document.getElementById("library-sidebar").classList.add("collapsed");
  } else {
    document.getElementById("library-sidebar-tab").textContent = "‹";
  }
</script>
{% endblock %}
