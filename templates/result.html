{% extends 'base.html' %}

{% block title %}Results — Study Tool{% endblock %}

{% block head %}
{{ super() }}
<style>
  /* ── Two-panel layout ── */
  main {
    position: relative;
    display: flex;
    flex: 1;
    min-height: calc(100vh - var(--navbar-height));
    /* overflow: hidden; */
  }

  .panel {
    overflow-y: auto;
    padding: 2.5rem 2rem;
    flex-shrink: 0;
  }

  #panel-article {
    flex: 0 0 65%;
  }

  #panel-notes {
    flex: 1;
    background: var(--surface);
  }

  /* ── Drag divider ── */
  .divider {
    width: 5px;
    flex-shrink: 0;
    background: var(--border);
    cursor: col-resize;
    position: relative;
    transition: background 0.15s;
  }

  .divider::after {
    content: "";
    position: absolute;
    inset: 0 -4px;
    /* widen grab zone */
  }

  .divider:hover,
  .divider.dragging {
    background: var(--accent);
  }

  /* ── Panel header ── */
  .panel-header {
    display: flex;
    justify-content: flex-end;
  }

  .panel-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .copy-btn {
    padding: 0.25rem 0.6rem;
    font-size: 0.75rem;
  }

  /* ── Article prose ── */
  .article-body {
    font-family: var(--prose);
    font-size: 1.05rem;
    line-height: 1.8;
    max-width: 680px;
    margin: 0 auto;
  }

  .article-body h1,
  .article-body h2,
  .article-body h3 {
    font-family: var(--font);
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin: 2rem 0 0.75rem;
  }

  .article-body h1 {
    font-size: 1.75rem;
    margin-top: 0;
  }

  .article-body h2 {
    font-size: 1.25rem;
  }

  .article-body h3 {
    font-size: 1.05rem;
    color: var(--muted);
  }

  .article-body p {
    margin-bottom: 1.1rem;
  }

  .article-body strong {
    color: #fff;
    font-weight: 600;
  }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  .article-body a {
    color: var(--accent-h);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .article-body code {
    background: var(--border);
    border-radius: 4px;
    font-size: 0.88em;
    padding: 0.1em 0.4em;
  }

  .article-body pre {
    background: #0a0c12;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-x: auto;
    padding: 1rem;
    margin: 1.25rem 0;
  }

  .article-body pre code {
    background: none;
    padding: 0;
    font-size: 0.875rem;
  }

  /* ── Study notes ── */
  .notes-body {
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .notes-body ul {
    list-style: none;
    padding: 0;
  }

  .notes-body ul li {
    position: relative;
    padding-left: 1.1rem;
    margin-bottom: 0.5rem;
  }

  .notes-body ul li::before {
    content: "·";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .notes-body ul ul {
    margin-top: 0.35rem;
    margin-left: 0.75rem;
  }

  .notes-body ul ul li::before {
    content: "–";
    color: var(--muted);
  }

  .notes-body p {
    margin-bottom: 0.75rem;
    color: var(--muted);
  }

  .notes-body strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Save button ── */
  .save-btn {
    background: var(--accent);
    color: #fff;
  }

  .save-btn:hover {
    background: var(--accent-h);
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .layout {
      flex-direction: column;
      overflow: auto;
    }

    .panel {
      flex: none !important;
      width: 100% !important;
      height: auto;
    }

    .divider {
      width: 100%;
      height: 5px;
      cursor: row-resize;
    }
  }
</style>
{% endblock %}

{% block content %}
<main>
  <div class="panel" id="panel-article">
    <div class="panel-header">
      <button class="btn copy-btn" onclick="copy('article-content', this)">Copy</button>
    </div>
    <div class="article-body" id="article-body">
      <span class="panel-label">Article</span>
      <div class="article-content" id="article-content">
        {{ article | safe }}
      </div>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="panel" id="panel-notes">
    <div class="panel-header">
      <button class="btn copy-btn" onclick="copy('notes-content', this)">Copy</button>
    </div>
    <div class="notes-body" id="notes-body">
      <span class="panel-label">Study Notes</span>
      <div class="notes-content" id="notes-content">
        {{ notes | safe }}
      </div>
    </div>
  </div>


  <!-- Save modal -->
  <div class="modal-overlay" id="save-modal">
    <div class="modal">
      <p class="modal-title">Save to library</p>
      <div class="modal-body">
        <div>
          <label class="field-label" for="save-title">Title</label>
          <input class="field" type="text" id="save-title" />
        </div>
        <div>
          <label class="field-label" for="save-folder">Folder</label>
          <select class="field" id="save-folder">
            <option value="">Unfiled</option>
          </select>
        </div>
        <div id="new-folder-inline" style="display: none;">
          <label class="field-label">New folder name</label>
          <input class="field" type="text" id="inline-folder-name" placeholder="Folder name" />
          <div class="modal-actions" style="margin-top: 0.5rem;">
            <button class="btn" onclick="cancelInlineFolder()">Cancel</button>
            <button class="btn btn-primary" onclick="createInlineFolder()">Create</button>
          </div>
        </div>
        <button class="btn btn-ghost" style="width: 100%;" onclick="showInlineFolder()">
          ＋ New folder
        </button>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveArticle()">Save</button>
      </div>
    </div>
  </div>
</main>

{% endblock %}

{% block scripts %}
<script>
  /* ── Data from server ── */
  const ARTICLE_JSON = {{ article_json | tojson }};
  const NOTES_JSON = {{ notes_json | tojson }};
  const VIDEO_URL = {{ (video.url       if video and video.url       else "") | tojson }};
  const VIDEO_TITLE = {{ (video.title     if video and video.title     else "") | tojson }};
  const VIDEO_CHANNEL = {{ (video.channel   if video and video.channel   else "") | tojson }};
  const THUMBNAIL_URL = {{ (video.thumbnail if video and video.thumbnail else "") | tojson }};
  const DURATION = {{ (video.duration  if video and video.duration  else 0)  | tojson }};

  /* ── Copy ── */
  function copy(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    });
  }

  /* ── Resizable panels ── */
  (function () {
    const divider = document.getElementById("divider");
    const layout = divider.parentElement;
    const left = document.getElementById("panel-article");
    let dragging = false;

    divider.addEventListener("mousedown", () => {
      dragging = true;
      divider.classList.add("dragging");
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
    });

    document.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const rect = layout.getBoundingClientRect();
      const pct = Math.min(80, Math.max(20, ((e.clientX - rect.left) / rect.width) * 100));
      left.style.flex = `0 0 ${pct}%`;
    });

    document.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove("dragging");
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    });
  })();

  /* ── Save modal ── */
  async function openSaveModal() {
    document.getElementById("save-title").value = ARTICLE_JSON.title || "";
    const res = await fetch("/folders");
    const tree = await res.json();
    const select = document.getElementById("save-folder");
    select.innerHTML = '<option value="">Unfiled</option>';
    populateFolderSelect(select, tree, 0);
    document.getElementById("save-modal").classList.add("open");
    setTimeout(() => document.getElementById("save-title").focus(), 50);
  }

  function populateFolderSelect(select, folders, depth) {
    folders.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f.id;
      opt.textContent = "\u00a0".repeat(depth * 4) + f.name;
      select.appendChild(opt);
      if (f.children?.length) populateFolderSelect(select, f.children, depth + 1);
    });
  }

  async function saveArticle() {
    const title = document.getElementById("save-title").value.trim() || ARTICLE_JSON.title;
    const folder_id = document.getElementById("save-folder").value || null;

    const res = await fetch("/saves", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        folder_id, title,
        url: VIDEO_URL,
        article: ARTICLE_JSON,
        notes: NOTES_JSON,
        video_title: VIDEO_TITLE,
        video_channel: VIDEO_CHANNEL,
        thumbnail_url: THUMBNAIL_URL,
        duration: DURATION,
      }),
    });

    if (res.ok) {
      closeModal();
      window.location.href = "/library";
    } else {
      const err = await res.json().catch(() => ({}));
      alert("Failed to save: " + (err.error || res.status));
    }
  }

  function closeModal() {
    document.getElementById("save-modal").classList.remove("open");
    cancelInlineFolder();
  }

  /* ── Inline folder creation ── */
  function showInlineFolder() {
    document.getElementById("new-folder-inline").style.display = "block";
    document.getElementById("inline-folder-name").focus();
  }

  function cancelInlineFolder() {
    document.getElementById("new-folder-inline").style.display = "none";
    document.getElementById("inline-folder-name").value = "";
  }

  async function createInlineFolder() {
    const name = document.getElementById("inline-folder-name").value.trim();
    if (!name) return;

    const res = await fetch("/folders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, parent_id: null }),
    });

    if (!res.ok) { alert("Failed to create folder."); return; }

    const folder = await res.json();
    const select = document.getElementById("save-folder");
    const opt = document.createElement("option");
    opt.value = folder.id;
    opt.textContent = folder.name;
    opt.selected = true;
    select.appendChild(opt);
    cancelInlineFolder();
  }

  /* ── Close on backdrop click ── */
  document.getElementById("save-modal").addEventListener("click", (e) => {
    if (e.target === document.getElementById("save-modal")) closeModal();
  });
</script>
{% endblock %}
